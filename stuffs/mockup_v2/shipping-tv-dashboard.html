<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping TV Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .metric-value {
            transition: color 0.3s ease;
        }

        .bar-transition {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carrier-highlight {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden flex flex-col select-none">

    <!-- HEADER -->
    <header class="bg-white px-10 py-6 shadow-xl flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-6">
            <div
                class="w-20 h-20 bg-gray-800 rounded-2xl flex items-center justify-center text-white text-5xl shadow-lg">
                <i class="fa-solid fa-truck-fast"></i>
            </div>
            <h1 class="text-6xl font-black tracking-tight text-gray-800 uppercase">Shipping Zone Output</h1>
        </div>
        <div class="flex items-center gap-10">
            <div class="flex flex-col items-end">
                <div class="text-3xl font-bold text-gray-400" id="last-updated">Last Updated: --:--:--</div>
                <div class="text-2xl font-semibold text-gray-300" id="refresh-timer">Next Refresh: 30s</div>
            </div>
            <div class="bg-gray-50 border-2 border-gray-100 rounded-2xl px-8 py-4 shadow-inner">
                <span id="clock" class="text-6xl font-mono font-black text-gray-800 tracking-widest">--:--:--</span>
            </div>
            <button onclick="document.documentElement.requestFullscreen()"
                class="bg-gray-800 text-white rounded-2xl px-8 py-6 text-3xl font-bold hover:bg-gray-900 shadow-lg transition-transform active:scale-95 flex items-center gap-4">
                <i class="fa-solid fa-expand"></i> Fullscreen
            </button>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 p-8 overflow-hidden h-full flex flex-col gap-8">

        <!-- TOP METRICS SUMMARY -->
        <div class="grid grid-cols-4 gap-8 shrink-0">
            <div class="col-span-1 bg-white rounded-[2rem] shadow-lg p-8 flex flex-col justify-center">
                <h3 class="text-3xl font-bold text-gray-400 uppercase tracking-widest">Total Parcels Shipped</h3>
                <div class="text-[6rem] font-black text-gray-800 mt-2 metric-value" id="total-parcels">0</div>
            </div>
            <div
                class="col-span-2 bg-white rounded-[2rem] shadow-lg p-8 flex items-center justify-between border-l-8 border-blue-500">
                <h3 class="text-4xl font-black text-gray-700 uppercase tracking-widest w-1/3">Peak Hours Trend</h3>
                <div class="flex items-end gap-3 h-32 flex-1 justify-end">
                    <div class="w-12 bg-blue-200 rounded-t-lg" style="height: 30%"></div>
                    <div class="w-12 bg-blue-300 rounded-t-lg" style="height: 50%"></div>
                    <div class="w-12 bg-blue-400 rounded-t-lg" style="height: 70%"></div>
                    <div class="w-12 bg-blue-500 rounded-t-lg" style="height: 90%"></div>
                    <div class="w-12 bg-blue-600 rounded-t-lg" style="height: 100%"></div>
                    <div class="w-12 bg-blue-500 rounded-t-lg" style="height: 85%"></div>
                    <div class="w-12 bg-blue-400 rounded-t-lg animate-pulse" id="current-hour-bar" style="height: 60%">
                    </div>
                </div>
            </div>
            <div class="col-span-1 bg-white rounded-[2rem] shadow-lg p-8 flex items-center justify-center border-4 border-transparent transition-colors duration-1000"
                id="intensity-card">
                <div class="text-center">
                    <h3 class="text-2xl font-bold text-gray-400 uppercase tracking-widest mb-2">Operations Status</h3>
                    <div class="text-5xl font-black uppercase tracking-tight" id="intensity-text">NORMAL</div>
                </div>
            </div>
        </div>

        <!-- 3 CARRIER CARDS -->
        <div class="grid grid-cols-3 gap-8 flex-1">

            <!-- FEDEX -->
            <div class="bg-white rounded-[3rem] shadow-xl p-10 flex flex-col border-8 border-transparent transition-all duration-700 relative overflow-hidden group"
                id="card-fedex">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-[#4d148c]/10 to-transparent opacity-0 transition-opacity group-hover:opacity-100">
                </div>
                <div class="flex justify-between items-center mb-8 relative z-10">
                    <h2 class="text-6xl font-black text-[#4d148c] tracking-tighter">FedEx</h2>
                    <i class="fa-solid fa-plane-departure text-5xl text-gray-300"></i>
                </div>

                <h3 class="text-3xl font-bold text-gray-400 uppercase tracking-widest shrink-0">Parcels Today</h3>
                <div class="text-[9rem] leading-none font-black text-gray-800 mt-4 mb-auto metric-value val-carrier"
                    id="val-fedex">0</div>

                <div class="mt-8 shrink-0">
                    <h4 class="text-2xl font-bold text-gray-500 uppercase tracking-widest mb-6">Hourly Volume</h4>
                    <div class="flex items-end gap-2 h-32 w-full" id="bars-fedex">
                        <!-- populated by JS -->
                    </div>
                </div>

                <!-- Active badge -->
                <div class="absolute top-8 right-8 bg-blue-500 text-white font-bold px-6 py-2 rounded-full text-2xl uppercase tracking-widest opacity-0 transition-opacity duration-300"
                    id="badge-fedex">Leading</div>
            </div>

            <!-- UPS -->
            <div class="bg-white rounded-[3rem] shadow-xl p-10 flex flex-col border-8 border-transparent transition-all duration-700 relative overflow-hidden group"
                id="card-ups">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-[#351c15]/10 to-transparent opacity-0 transition-opacity group-hover:opacity-100">
                </div>
                <div class="flex justify-between items-center mb-8 relative z-10">
                    <h2 class="text-6xl font-black text-[#351c15] tracking-tighter">UPS</h2>
                    <i class="fa-solid fa-truck text-5xl text-gray-300"></i>
                </div>

                <h3 class="text-3xl font-bold text-gray-400 uppercase tracking-widest shrink-0">Parcels Today</h3>
                <div class="text-[9rem] leading-none font-black text-gray-800 mt-4 mb-auto metric-value val-carrier"
                    id="val-ups">0</div>

                <div class="mt-8 shrink-0">
                    <h4 class="text-2xl font-bold text-gray-500 uppercase tracking-widest mb-6">Hourly Volume</h4>
                    <div class="flex items-end gap-2 h-32 w-full" id="bars-ups">
                        <!-- populated by JS -->
                    </div>
                </div>

                <div class="absolute top-8 right-8 bg-blue-500 text-white font-bold px-6 py-2 rounded-full text-2xl uppercase tracking-widest opacity-0 transition-opacity duration-300"
                    id="badge-ups">Leading</div>
            </div>

            <!-- USPS -->
            <div class="bg-white rounded-[3rem] shadow-xl p-10 flex flex-col border-8 border-transparent transition-all duration-700 relative overflow-hidden group"
                id="card-usps">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-[#004b87]/10 to-transparent opacity-0 transition-opacity group-hover:opacity-100">
                </div>
                <div class="flex justify-between items-center mb-8 relative z-10">
                    <h2 class="text-6xl font-black text-[#004b87] tracking-tighter">USPS</h2>
                    <i class="fa-solid fa-envelopes-bulk text-5xl text-gray-300"></i>
                </div>

                <h3 class="text-3xl font-bold text-gray-400 uppercase tracking-widest shrink-0">Parcels Today</h3>
                <div class="text-[9rem] leading-none font-black text-gray-800 mt-4 mb-auto metric-value val-carrier"
                    id="val-usps">0</div>

                <div class="mt-8 shrink-0">
                    <h4 class="text-2xl font-bold text-gray-500 uppercase tracking-widest mb-6">Hourly Volume</h4>
                    <div class="flex items-end gap-2 h-32 w-full" id="bars-usps">
                        <!-- populated by JS -->
                    </div>
                </div>

                <div class="absolute top-8 right-8 bg-blue-500 text-white font-bold px-6 py-2 rounded-full text-2xl uppercase tracking-widest opacity-0 transition-opacity duration-300"
                    id="badge-usps">Leading</div>
            </div>

        </div>

    </main>

    <script>
        // --- CONFIGURATION ---
        const REFRESH_INTERVAL_SEC = 30;
        let countdown = REFRESH_INTERVAL_SEC;

        // --- STATE ---
        let carriers = {
            fedex: { total: 4210, history: [120, 340, 450, 420, 310, 520, 210, 400], color: '#4d148c' },
            ups: { total: 3850, history: [100, 300, 400, 380, 290, 480, 190, 350], color: '#351c15' },
            usps: { total: 5400, history: [180, 410, 560, 500, 420, 610, 280, 520], color: '#004b87' }
        };
        let intensity = 'normal';

        // --- RENDER FUNCTIONS ---
        function renderUI() {
            let grandTotal = 0;
            let maxTotal = 0;
            let leadingCarrier = '';

            // Find leader and total
            for (const [key, data] of Object.entries(carriers)) {
                grandTotal += data.total;
                if (data.total > maxTotal) {
                    maxTotal = data.total;
                    leadingCarrier = key;
                }
            }

            animateValue('total-parcels', grandTotal);

            // Update each carrier
            for (const [key, data] of Object.entries(carriers)) {
                animateValue(`val-${key}`, data.total);

                const card = document.getElementById(`card-${key}`);
                const badge = document.getElementById(`badge-${key}`);

                if (key === leadingCarrier) {
                    card.classList.add('carrier-highlight');
                    badge.classList.remove('opacity-0');
                    card.style.borderColor = data.color;
                } else {
                    card.classList.remove('carrier-highlight');
                    badge.classList.add('opacity-0');
                    card.style.borderColor = 'transparent';
                }

                // Render bars
                const barsContainer = document.getElementById(`bars-${key}`);
                const maxVol = Math.max(...data.history, 100);

                let html = '';
                data.history.forEach((vol, idx) => {
                    const pct = Math.min((vol / maxVol) * 100, 100);
                    const isLast = idx === data.history.length - 1;
                    const pulse = isLast ? 'animate-pulse' : '';
                    const opacity = isLast ? 'opacity-100' : 'opacity-60';
                    html += `<div class="flex-1 rounded-t-lg bar-transition ${pulse} ${opacity}" style="background-color: ${data.color}; height: ${pct}%"></div>`;
                });
                barsContainer.innerHTML = html;
            }

            // Global trend bar
            document.getElementById('current-hour-bar').style.height = `${Math.floor(Math.random() * 40 + 40)}%`;

            // Intensity
            const iCard = document.getElementById('intensity-card');
            const iText = document.getElementById('intensity-text');

            let bg = 'bg-white', border = 'border-transparent', color = 'text-gray-800';
            if (intensity === 'low') { bg = 'bg-blue-50'; border = 'border-blue-300'; color = 'text-blue-700'; }
            else if (intensity === 'normal') { bg = 'bg-green-50'; border = 'border-green-300'; color = 'text-green-700'; }
            else if (intensity === 'high') { bg = 'bg-orange-50'; border = 'border-orange-400'; color = 'text-orange-600'; }
            else if (intensity === 'peak') { bg = 'bg-red-50'; border = 'border-red-500'; color = 'text-red-600'; iCard.classList.add('animate-pulse'); }

            if (intensity !== 'peak') iCard.classList.remove('animate-pulse');

            iCard.className = `col-span-1 border-4 ${bg} ${border} rounded-[2rem] shadow-lg p-8 flex items-center justify-center transition-colors duration-1000`;
            iText.className = `text-5xl font-black uppercase tracking-tight ${color}`;
            iText.textContent = intensity;
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-updated').textContent = 'Last Updated: ' + now.toLocaleTimeString('en-US', { hour12: false });
        }

        function animateValue(id, end) {
            const obj = document.getElementById(id);
            if (!obj) return;
            const start = parseInt(obj.textContent.replace(/,/g, '')) || 0;
            if (start === end) return;

            const duration = 1500;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                obj.textContent = current.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.textContent = end.toLocaleString();
                }
            };
            window.requestAnimationFrame(step);
        }

        function simulateData() {
            // Add some random shipments to each
            carriers.fedex.total += Math.floor(Math.random() * 20);
            carriers.ups.total += Math.floor(Math.random() * 15);
            carriers.usps.total += Math.floor(Math.random() * 25);

            // Update latest histogram bar for each
            for (const key of Object.keys(carriers)) {
                let last = carriers[key].history.pop();
                last += Math.floor(Math.random() * 10);
                carriers[key].history.push(last);
            }

            const totalNew = Math.floor(Math.random() * 60);
            if (totalNew > 50) intensity = 'peak';
            else if (totalNew > 40) intensity = 'high';
            else if (totalNew < 15) intensity = 'low';
            else intensity = 'normal';

            renderUI();
            updateTimestamp();
        }

        // --- LOOP ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });

            countdown--;
            if (countdown <= 0) {
                countdown = REFRESH_INTERVAL_SEC;
                simulateData();
            }
            document.getElementById('refresh-timer').textContent = `Next Refresh: ${countdown}s`;
        }, 1000);

        // --- INIT ---
        renderUI();
        updateTimestamp();

    </script>
</body>

</html>
